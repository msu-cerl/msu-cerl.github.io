{% extends "base.html" %}

{% block title %}{{ page.title | striptags }} | {{ SITENAME }}{% endblock %}

{% block body %}
{% if page.event_page %}<style>.footnote-backref { display: none; } table { table-layout: fixed; width: 100%; } table td:first-child, table th:first-child { width: 12rem; } @media (max-width: 768px) { table { display: block; overflow-x: auto; width: 100%; } }</style>
<script>document.addEventListener('DOMContentLoaded', function () { var fn = document.querySelector('.footnote'); var table = document.querySelector('table'); if (fn && table) table.parentNode.insertBefore(fn, table.nextSibling); });</script>{% endif %}
<main id="main-content" class="page-content typeset">
  <h1 class="page-title">{{ page.title }}</h1>
  {{ page.content }}
</main>
{% endblock %}
