{% extends "base.html" %}

{% block title %}{{ page.title | striptags }} | {{ SITENAME }}{% endblock %}

{% block body %}
{% if page.event_page %}<style>.footnote-backref { display: none; } table { table-layout: fixed; min-width: 44rem; } table td:first-child, table th:first-child { width: 12rem; } .table-scroll { overflow-x: auto; }</style>
<script>document.addEventListener('DOMContentLoaded', function () { var fn = document.querySelector('.footnote'); var table = document.querySelector('table'); if (fn && table) { table.parentNode.insertBefore(fn, table.nextSibling); var wrapper = document.createElement('div'); wrapper.className = 'table-scroll'; table.parentNode.insertBefore(wrapper, table); wrapper.appendChild(table); } });</script>{% endif %}
<main id="main-content" class="page-content typeset">
  <h1 class="page-title">{{ page.title }}</h1>
  {{ page.content }}
</main>
{% endblock %}
