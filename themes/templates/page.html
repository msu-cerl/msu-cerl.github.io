{% extends "base.html" %}

{% block title %}{{ page.title | striptags }} | {{ SITENAME }}{% endblock %}

{% block body %}
{% if page.event_page %}<style>.footnote-backref { display: none; } table { table-layout: fixed; width: 100%; } table td:first-child, table th:first-child { width: 12rem; }</style>{% endif %}
<main id="main-content" class="page-content typeset">
  <h1 class="page-title">{{ page.title }}</h1>
  {{ page.content }}
</main>
{% endblock %}
