{% extends "base.html" %}

{% block title %}{{ SITENAME }}{% endblock %}

{% block feature %}
{# <div class="feature-hero" style="background-image: url('{{ SITEURL }}{{ FEATURE_IMAGE }}')">
  <div class="feature-overlay"></div>
</div> #}
{% endblock %}

{% block layout_class %}with-aside{% endblock %}

{% block body %}
<main class="page-content typeset">
  {{ page.content }}
</main>
<aside class="page-aside">
  <section class="aside-section">
    <picture>
      <source srcset="{{ SITEURL }}/assets/img/CERL_squirrel_nobackground_whitetext_v2.png"
              media="(prefers-color-scheme: dark)">
      <img src="{{ SITEURL }}/assets/img/CERL_squirrel_logo_v1_nobackground_blacktext.png"
           alt="CERL squirrel logo" class="aside-logo">
    </picture>
    <h3>Welcome!</h3>
    <p>{{ SITE_DESCRIPTION | safe }}</p>
  </section>
</aside>
{% endblock %}
