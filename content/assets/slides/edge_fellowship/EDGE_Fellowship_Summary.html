<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="0.898ex" height="1.949ex" role="img" focusable="false" viewBox="0 -861.5 397 861.5"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"></g><g data-mml-node="mo" transform="translate(33,363) scale(0.707)"><path data-c="2020" d="M182 675Q195 705 222 705Q234 705 243 700T253 691T263 675L262 655Q262 620 252 549T240 454V449Q250 451 288 461T346 472T377 461T389 431Q389 417 379 404T346 390Q327 390 288 401T243 412H240V405Q245 367 250 339T258 301T261 274T263 225Q263 124 255 -41T239 -213Q236 -216 222 -216H217Q206 -216 204 -212T200 -186Q199 -175 199 -168Q181 38 181 225Q181 265 182 280T191 327T204 405V412H201Q196 412 157 401T98 390Q76 390 66 403T55 431T65 458T98 472Q116 472 155 462T205 449Q204 452 204 460T201 490T193 547Q182 619 182 655V675Z"></path></g></g></g></g></svg></mjx-container> The final interview count was actually 11, but the last two interviews occurred after the initial analysis was complete and the course development was underway.</p>
</div>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-class="section-divider" data-theme="default" lang="en-US" class="section-divider" data-marpit-pagination="3" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--class:section-divider;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h1 id="part-1">Part 1</h1>
<h2 id="the-fellowship-not-of-the-rings">The Fellowship (not of the Rings)</h2>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="4" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h1 id="the-edge-fellowship">The EDGE Fellowship</h1>
<p><strong>NatSci Educator Development and Growth Experience (EDGE)</strong></p>
<p>A fellowship to promote professional development for FFAS allowing them to pursue a project that enhances their growth as an educator and scholar while also supporting the mission of the institution.</p>
<p><strong>My project goal:</strong></p>
<blockquote>
<p>Interview data science practitioners across Michigan industries to identify the gaps between what graduating DS majors know and what employers actually need — then use those findings to design a new course.</p>
</blockquote>
<p><em>Fall 2025</em> — Conducted research, synthesized findings, started course design<br />
<em>Spring 2026</em> — Taught CMSE 492 for the first time (34 students)</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="5" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="what-was-i-trying-to-address">What was I trying to address?</h2>
<p>The Data Science BS program at MSU develops strong <strong>statistical and modeling skills</strong> — but some students arrive at internships and first roles lacking the <em>surrounding professional infrastructure</em>:</p>
<div class="two-col">
<div class="col-box">
<p><strong>What students knew</strong></p>
<ul>
<li>Modeling with tools like sklearn</li>
<li>Statistical reasoning</li>
<li>Python syntax</li>
<li>Basic Git usage</li>
</ul>
</div>
<div class="col-box">
<p><strong>What they were missing</strong></p>
<ul>
<li>Reproducible environment management</li>
<li>Real version control workflows</li>
<li>Relational databases (for some students)</li>
<li>Cloud data platforms</li>
<li>Professional collaboration skills</li>
</ul>
</div>
</div>
<p>Students, alumni, and faculty had identified some of these — but I wanted <strong>direct employer data</strong> to confirm it and shape a response.</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-class="section-divider" data-theme="default" lang="en-US" class="section-divider" data-marpit-pagination="6" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--class:section-divider;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h1 id="part-2">Part 2</h1>
<h2 id="industry-research">Industry Research</h2>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="7" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h1 id="research-approach">Research Approach</h1>
<p><strong>Nine semi-structured interviews</strong> with data science practitioners in Michigan. Interviews spanned <strong>healthcare, insurance, consumer packaged goods (CPG), manufacturing, and software</strong>, covering a broad cross-section of Michigan's data science employer landscape.</p>
<p><strong>Questions focused on:</strong></p>
<ul>
<li>Day-to-day toolchain and workflows</li>
<li>Skill mismatch observed in early-career hires</li>
<li>Characteristics of a strong junior DS hire</li>
<li>Views on AI tools and responsible use</li>
</ul>
<p>Also probed interest in MSU partnership opportunities</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="8" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="finding-1--the-professional-toolchain-gap">Finding #1 — The Professional Toolchain Gap</h2>
<p><strong>Common core stack across sectors:</strong> Python · SQL · cloud platform</p>
<p>But fluency — not just familiarity — is what employers desire/expect:</p>
<ul>
<li>Write <strong>clear, maintainable code</strong> that teammates can understand</li>
<li>Move comfortably between notebooks, IDEs, and production environments</li>
<li>Understand <strong>relational databases</strong> deeply, not just <code>SELECT *</code></li>
</ul>
<p><strong>Specific gaps cited:</strong></p>
<ul>
<li>Setting up and managing Python environments</li>
<li>Terminal and command-line fluency, including <em>real</em> Git usage.</li>
<li>SQL beyond single-table queries: schema design, debugging, validation</li>
</ul>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="9" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="finding-2--math-and-modeling-depth">Finding #2 — Math and Modeling Depth</h2>
<p>A recurring theme: students &quot;know the library, not the method.&quot;</p>
<p>Employers see candidates who can call <code>sklearn</code> but cannot:</p>
<ul>
<li>Explain <strong>what a model is actually doing</strong> and why it's appropriate</li>
<li>Validate results against domain logic (sanity checks, output verification)</li>
<li>Know when <strong>simple model</strong> (GLM, classical time series) beats a complex one</li>
</ul>
<div class="callout">
<p><em>&quot;Programming can be learned more easily than modeling judgment. We'd rather hire someone with a strong math background.&quot;</em></p>
</div>
<p><strong>Implication for curriculum:</strong> reinforce connections between tools and reasoning, not just syntax and API usage.</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="10" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="finding-3--professional-and-collaborative-skills">Finding #3 — Professional and Collaborative Skills</h2>
<p>Technical skills are <strong>necessary but not sufficient</strong>. Interviewees consistently cited:</p>
<ul>
<li><strong>Critical thinking about results</strong> — questioning surprising outputs, recognizing when something is off</li>
<li><strong>Communication</strong> — explaining methods to non-technical stakeholders in writing and presentations</li>
<li><strong>Project management</strong> — breaking work into tasks, raising blockers early</li>
<li><strong>Collaboration across roles</strong> — working with engineers, product, operations, domain experts</li>
<li><strong>AI tool literacy</strong> — can you <em>critically evaluate</em> what it generates, recognize hallucinations, and understand when AI use is inappropriate?</li>
</ul>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="11" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="subfinding-industry-partnership-appetite">Subfinding: Industry Partnership Appetite</h2>
<p>Nearly all nine interviewees expressed interest in engaging with MSU:</p>
<table>
<thead>
<tr>
<th>Partnership Type</th>
<th>Interest Level</th>
</tr>
</thead>
<tbody>
<tr>
<td>Guest speaking (AI, forecasting, governance, DS career paths)</td>
<td>High — nearly all willing</td>
</tr>
<tr>
<td>Curriculum feedback and assignment review</td>
<td>High — several offered directly</td>
</tr>
<tr>
<td>Case studies and anonymized data scenarios</td>
<td>Medium — subject to legal/privacy constraints</td>
</tr>
<tr>
<td>Capstone project sponsorship</td>
<td>Medium — especially CPG and software sectors</td>
</tr>
<tr>
<td>Internship and co-op pipelines</td>
<td>High appetite, especially for authentic industry experience</td>
</tr>
</tbody>
</table>
<p><strong>Key insight:</strong> practitioners prefer <em>concrete asks</em> over open-ended consulting — bring specific proposals, not blank invitations.</p>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="12" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="how-does-all-of-this-translate-into-curriculum">How does all of this translate into curriculum?</h2>
<p>Five high-priority curriculum recommendations emerged from the interviews:</p>
<ol>
<li><strong>Software engineering bootcamp</strong> — environments, terminal, Git as real workflow, not afterthought</li>
<li><strong>SQL and Python in context</strong> — multi-table, messy, realistic data; emphasis on debugging and validation</li>
<li><strong>Cloud exposure</strong> — where data actually lives in industry today (or soon)</li>
<li><strong>Structured AI literacy</strong> — allow <em>and</em> critique AI-assisted work; address bias, privacy, hallucination</li>
<li><strong>Portfolio-quality projects</strong> — artifacts that demonstrate real workflows, not just homework exercises</li>
</ol>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-class="section-divider" data-theme="default" lang="en-US" class="section-divider" data-marpit-pagination="13" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--class:section-divider;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h1 id="part-3">Part 3</h1>
<h2 id="course-design">Course Design</h2>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="14" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="what-should-modern-tools-for-the-professional-data-science-look-like">What should &quot;Modern Tools for the Professional Data Science&quot;<mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="0.898ex" height="1.949ex" role="img" focusable="false" viewBox="0 -861.5 397 861.5"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"></g><g data-mml-node="mo" transform="translate(33,363) scale(0.707)"><path data-c="2020" d="M182 675Q195 705 222 705Q234 705 243 700T253 691T263 675L262 655Q262 620 252 549T240 454V449Q250 451 288 461T346 472T377 461T389 431Q389 417 379 404T346 390Q327 390 288 401T243 412H240V405Q245 367 250 339T258 301T261 274T263 225Q263 124 255 -41T239 -213Q236 -216 222 -216H217Q206 -216 204 -212T200 -186Q199 -175 199 -168Q181 38 181 225Q181 265 182 280T191 327T204 405V412H201Q196 412 157 401T98 390Q76 390 66 403T55 431T65 458T98 472Q116 472 155 462T205 449Q204 452 204 460T201 490T193 547Q182 619 182 655V675Z"></path></g></g></g></g></svg></mjx-container> look like?</h2>
<p><strong>Core purpose:</strong> Bridge upper-division DS theory with the tools, workflows, and habits that define professional data science work in industry — grounded directly in what Michigan employers told me they need.</p>
<div class="footnote">
<p><mjx-container class="MathJax" jax="SVG"><svg style="vertical-align: 0;" xmlns="http://www.w3.org/2000/svg" width="0.898ex" height="1.949ex" role="img" focusable="false" viewBox="0 -861.5 397 861.5"><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="scale(1,-1)"><g data-mml-node="math"><g data-mml-node="msup"><g data-mml-node="mi"></g><g data-mml-node="mo" transform="translate(33,363) scale(0.707)"><path data-c="2020" d="M182 675Q195 705 222 705Q234 705 243 700T253 691T263 675L262 655Q262 620 252 549T240 454V449Q250 451 288 461T346 472T377 461T389 431Q389 417 379 404T346 390Q327 390 288 401T243 412H240V405Q245 367 250 339T258 301T261 274T263 225Q263 124 255 -41T239 -213Q236 -216 222 -216H217Q206 -216 204 -212T200 -186Q199 -175 199 -168Q181 38 181 225Q181 265 182 280T191 327T204 405V412H201Q196 412 157 401T98 390Q76 390 66 403T55 431T65 458T98 472Q116 472 155 462T205 449Q204 452 204 460T201 490T193 547Q182 619 182 655V675Z"></path></g></g></g></g></svg></mjx-container> Piloted under the course code <strong>CMSE 492</strong> in Spring 2026.</p>
</div>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="15" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="learning-goals-for-cmse-492">Learning Goals for CMSE 492</h2>
<p><strong>Seven learning goals students I aimed to have students meet by the end of the semester:</strong></p>
<ol>
<li>Execute <strong>end-to-end, reproducible workflows</strong> combining SQL, Python, Git, and cloud tools</li>
<li><strong>Deconstruct problems effectively</strong> — translate stakeholder needs into technical requirements</li>
<li><strong>Validate outputs critically</strong> — tests, visualizations, domain-knowledge sanity checks</li>
<li><strong>Independently learn new tools</strong> — documentation, tutorials, community forums</li>
</ol>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="16" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="learning-goals-for-cmse-492-continued">Learning Goals for CMSE 492 (continued)</h2>
<p><strong>Seven learning goals students I aimed to have students meet by the end of the semester:</strong></p>
<ol start="5">
<li><strong>Collaborate and communicate professionally</strong> — Agile-style practices, stakeholder artifacts</li>
<li><strong>Use AI tools ethically</strong> — audit bias, privacy, and hallucination risks</li>
<li><strong>Build deployable portfolio artifacts</strong> — scoped to real problems, defended in presentations</li>
</ol>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="17" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h1 id="course-structure">Course Structure</h1>
<p><strong>Format:</strong> 3 × 50-minute sessions per week (MWF), 3 credits</p>
<table>
<thead>
<tr>
<th>Decision</th>
<th>Rationale</th>
</tr>
</thead>
<tbody>
<tr>
<td>MWF 50-min sessions</td>
<td>Institutional constraint; intended for intro → practice → reflection rhythm</td>
</tr>
<tr>
<td>36-student pilot</td>
<td>Enrollment cap set for hands-on course with significant TA support needs</td>
</tr>
<tr>
<td>GitHub-centric</td>
<td>All deliverables live in version-controlled repos; builds portfolio naturally</td>
</tr>
<tr>
<td>Teams of 3–4</td>
<td>Mirrors industry team structure; supports collaboration learning goals</td>
</tr>
<tr>
<td>No required textbook</td>
<td>Content lives in Jupyter Book; tools change faster than textbooks update</td>
</tr>
<tr>
<td>Substantial HW projects</td>
<td>Portfolio-worthy artifacts, not throwaway assignments</td>
</tr>
</tbody>
</table>
<p><strong>Support:</strong> Graduate TA (John Byrd) for in-class and out-of-class technical assistance</p>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="18" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h1 id="the-five-modules">The Five Modules</h1>
<table>
<thead>
<tr>
<th>Module</th>
<th>Topics</th>
<th>Industry Connection</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>1 — Environment &amp; Project Management</strong></td>
<td><code>venv</code>, <code>conda</code>, <code>uv</code>, repo structure, documentation, version control</td>
<td>Reproducibility; SE habits</td>
</tr>
<tr>
<td><strong>2 — Containerization</strong></td>
<td>Docker concepts, Dockerfiles, reproducible execution</td>
<td>Portable, deployable workflows</td>
</tr>
<tr>
<td><strong>3 — SQL &amp; Relational Databases</strong></td>
<td>Relational data, SQL querying, validation, debugging, realistic DBs</td>
<td>&quot;Fundamental&quot; skill gap from interviews</td>
</tr>
<tr>
<td><strong>4 — Cloud Data Infrastructure</strong></td>
<td>AWS S3, Athena, SageMaker; end-to-end cloud ML pipeline</td>
<td>Where data might actually live in industry</td>
</tr>
<tr>
<td><strong>5 — AI-Assisted Development</strong></td>
<td>GitHub Copilot, responsible use, critical evaluation of AI-generated code</td>
<td>AI literacy; avoiding over-reliance</td>
</tr>
</tbody>
</table>
<p><strong>Recurring cross-cutting themes across all modules:</strong> reproducibility · critical validation · professional project organization · portfolio development</p>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="19" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="what-didnt-make-it-what-got-added">What didn't make it? What got added?</h2>
<p>My original course design ideas included more than the five modules, but not all of it fit within the semester. Some ideas were modified, new ideas emerged.</p>
<table>
<thead>
<tr>
<th>Planned topic</th>
<th>Outcome</th>
<th>Reason</th>
</tr>
</thead>
<tbody>
<tr>
<td>Agile/sprint frameworks</td>
<td>Cut</td>
<td>Not enough time, limited personal familiarity</td>
</tr>
<tr>
<td>Streamlit dashboards</td>
<td>Cut</td>
<td>Deprioritized in favor of deeper cloud work</td>
</tr>
<tr>
<td>MLOps / model deployment (FastAPI)</td>
<td>Cut</td>
<td>Beyond scope, limited industry demand</td>
</tr>
<tr>
<td>Guest lecture on AI (Dr. Dirk Colbry)</td>
<td>Added</td>
<td>External perspective to complement Module 5 content</td>
</tr>
<tr>
<td>Formal AI ethics debate</td>
<td>Merged</td>
<td>Addressed within Module 5 content and reflections</td>
</tr>
<tr>
<td>Mind mapping / cover letter / career translation</td>
<td>Added (Days 33–34)</td>
<td>Aid students in connecting their learning to future careers</td>
</tr>
</tbody>
</table>
<p><strong>Key lesson:</strong> 50-minute periods are very short! The SQL and Cloud modules both ran longer than planned because students needed — and benefited from — the extra time.</p>

<h2 id="student-voices-constructive-feedback">Student Voices: Constructive Feedback</h2>
<p>Constructive feedback was consistent and actionable:</p>
<ol>
<li>
<p><strong>Longer class periods</strong> <em>(most frequently cited)</em> — 50 minutes is too short for the depth and hands-on nature of the content; students suggested 2 × 75–90 min per week</p>
</li>
<li>
<p><strong>More depth on AWS</strong> — students valued the cloud module highly but wanted more time with real end-to-end workflows across S3, Athena, and SageMaker</p>
</li>
<li>
<p><strong>Calibrate PCA volume</strong> — early-semester pre-class assignment load felt heavy; three sessions per week compounds this compared to a two-day format</p>
</li>
</ol>
<footer> </footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" data-paginate="true" data-background-color="#ffffff" data-footer=" " data-theme="default" lang="en-US" data-marpit-pagination="34" style="--paginate:true;--background-color:#ffffff;--footer: ;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">

<ol start="4">
<li>
<p><strong>APIs</strong> <em>(9 of 27 requested this specifically)</em> — students encountered API concepts in capstone and internships with no prior exposure from coursework</p>
</li>
<li>
<p><strong>Agile/project management frameworks</strong> — was planned; got cut due to time</p>
</li>
<li>

</li>
</ol>
<footer> </footer>

<h1 id="part-6">Part 6</h1>
<h2 id="reflections--future-directions">Reflections &amp; Future Directions</h2>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="36" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="what-seemed-to-work">What Seemed to Work</h2>
<p><strong>The sequencing held up.</strong> Moving from environment management → containerization → SQL → cloud → AI-assisted development built genuine cumulative fluency. Students in later modules referenced earlier skills naturally.</p>
<p><strong>Portfolio framing changed student investment.</strong> Framing homework as artifacts for a real portfolio — not throwaway assignments — shifted how students approached the work.</p>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="37" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="what-seemed-to-work-continued">What Seemed to Work (continued)</h2>
<p><strong>The industry grounding was visible to students.</strong> Multiple students noted that the course felt <em>connected to actual jobs</em> in a way their other courses did not. The EDGE Fellowship research paid off in course credibility.</p>
<p><strong>Cross-cutting themes were internalized.</strong> The advice students gave future cohorts — <em>&quot;get really good at reproducibility,&quot; &quot;document everything,&quot; &quot;don't let AI take over your thinking&quot;</em> — mirrors the course's learning goals almost verbatim.</p>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="38" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="pain-points-and-lessons-learned">Pain Points and Lessons Learned</h2>
<p><strong>50-minute sessions are structurally too short.</strong> The most cited piece of student feedback. In-class assignments regularly ran over; instructional pacing was compressed throughout. This is a format problem, not a content problem.</p>
<p><strong>The toolchain changes constantly.</strong> Unlike a math course, CMSE 492 is built on a rapidly evolving stack — AWS interfaces update, <code>uv</code> is under active development, Copilot features are shifting. Keeping the course current is not one-time overhead; it is ongoing curriculum maintenance every time the course is offered.</p>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="39" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="pain-points-and-lessons-learned-continued">Pain Points and Lessons Learned (continued)</h2>
<p><strong>Some planned modules got cut.</strong> Agile, APIs, and Streamlit didn't fit into the schedule as SQL and cloud both ran longer than expected. These were reasonable tradeoffs, but they leave gaps students noticed.</p>
<p><strong>Collaboration was the least-reported skill gain.</strong> Only 12 of 26 students cited improved collaboration — the lowest of any skill area. The team structure may need more explicit scaffolding in future iterations.</p>
<ul>
<li>I somewhat intentionally let this part slide due to the room constraints and my own limitations in further developing this aspect of the course.</li>
</ul>
<footer>EDGE Fellowship — Devin Silvia · June 2026</footer>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" data-paginate="true" data-background-color="#ffffff" data-footer="EDGE Fellowship — Devin Silvia · June 2026" data-theme="default" lang="en-US" data-marpit-pagination="40" style="--paginate:true;--background-color:#ffffff;--footer:EDGE Fellowship — Devin Silvia · June 2026;--theme:default;background-color:#ffffff;background-image:none;" data-marpit-pagination-total="43">
<h2 id="recommendations-for-future-iterations">Recommendations for Future Iterations</h2>
<table>
<thead>
<tr>
<th>Recommendation</th>
<th>Rationale</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Pursue requirement status for the DS major</strong></td>
<td>Unanimous student support; demonstrated capstone impact</td>
</tr>
<tr>
<td><strong>Place the course before capstone</strong></td>
<td>Students and outcomes both point to this as the highest-value placement</td>
</tr>
<tr>
<td><strong>Move to longer class sessions</strong></td>
<td>Single most-cited structural improvement; 50-min periods are too compressed/rushed</td>
</tr>
<tr>
<td><strong>Add an APIs module</strong></td>
<td>9 of 27 students explicitly requested; consistently surfaces in capstone and internships</td>
</tr>
<tr>
<td><strong>Integrate Agile/sprint content</strong></td>
<td>Was cut for time; strong industry demand signal from the original interviews</td>
</tr>
<tr>
<td><strong>Support ongoing curriculum maintenance</strong></td>
<td>Tools evolve rapidly; annual updates are essential to the course's value proposition</td>
</tr>
<tr>

<p>CMSE 492 was designed to close a specific, well-documented gap — and the first offering's outcomes suggest it does exactly that.</p>

<ul>
<li>Systematic industry engagement can directly shape curriculum with measurable results</li>
<li>A new course targeting professional skills gaps can achieve exceptional student reception in its inaugural offering</li>
